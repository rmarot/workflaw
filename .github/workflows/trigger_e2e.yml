name: 'Trigger E2E'

on:
  pull_request:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Repository name (e.g., owner/repo)'
        required: false
        type: 'string'
      head_sha:
        description: 'SHA of the commit to test'
        required: false
        type: 'string'

# pull_request trigger: no secrets for fork PRs (safe by design).
# This job only saves the fork's repo name + SHA into an artifact.

jobs:
  save_repo_name:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Save fork repo name and HEAD SHA'
        env:
          REPO_NAME: '${{ github.event.inputs.repo_name || github.event.pull_request.head.repo.full_name }}'
          HEAD_SHA: '${{ github.event.inputs.head_sha || github.event.pull_request.head.sha }}'
        run: |
          mkdir -p ./pr
          echo "${REPO_NAME}" > ./pr/repo_name
          echo "${HEAD_SHA}" > ./pr/head_sha

      - name: 'Upload artifact'
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'repo_name'
          path: 'pr/'

  trigger_e2e:
    name: 'Trigger e2e'
    runs-on: 'ubuntu-latest'
    steps:
      - run: echo "Trigger e2e workflow"
