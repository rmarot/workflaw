  name: Vulnerable Review                                                                                                                                                                                   
                  
  on:
    issue_comment:
      types: [created]
                                                                                                                                                                                                            
  permissions:
    contents: read                                                                                                                                                                                          
    pull-requests: write

  jobs:
    manual-review:
      if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/review')
      runs-on: ubuntu-latest                                                                                                                                                                                
      steps:
        - name: Checkout PR head                                                                                                                                                                            
          uses: actions/checkout@v4
          with:                                                                                                                                                                                             
            ref: refs/pull/${{ github.event.issue.number }}/head
                                                                                                                                                                                                            
        - name: Run review action
          uses: ./review-pr                                                                                                                                                                                 
          with:   
            secret-value: ${{ secrets.TEST_SECRET }}