name: 'Testing: E2E (Chained)'

# VULNERABILITY: workflow_run ALWAYS runs in the context of the default branch
# with full access to repository secrets, regardless of whether the triggering
# workflow was a fork PR.

on:
  push:
    branches:
      - 'main'
  workflow_run:
    workflows: ['Trigger E2E']
    types: ['completed']
  workflow_dispatch:
    inputs:
      head_sha:
        description: 'SHA of the commit to test'
        required: true
      repo_name:
        description: 'Repository name (e.g., owner/repo)'
        required: true

permissions:
  contents: 'read'
  statuses: 'write'

jobs:
  # ---- Step 1: Read attacker-controlled repo name + SHA from artifact ----

  download_repo_name:
    runs-on: 'ubuntu-latest'
    if: "github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run'"
    outputs:
      repo_name: '${{ steps.output-repo-name.outputs.repo_name }}'
      head_sha: '${{ steps.output-repo-name.outputs.head_sha }}'
    steps:
      - name: 'Mock Repo Artifact (workflow_dispatch only)'
        if: "${{ github.event_name == 'workflow_dispatch' }}"
        env:
          REPO_NAME: '${{ github.event.inputs.repo_name }}'
        run: |
          mkdir -p ./pr
          echo "${REPO_NAME}" > ./pr/repo_name

      - uses: 'actions/upload-artifact@v4'
        with:
          name: 'repo_name'
          path: 'pr/'

      - name: 'Download the repo_name artifact'
        uses: 'actions/download-artifact@v4'
        env:
          RUN_ID: "${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || github.run_id }}"
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          name: 'repo_name'
          run-id: '${{ env.RUN_ID }}'
          path: '${{ runner.temp }}/artifacts'

      # No validation whatsoever on artifact contents
      - name: 'Output Repo Name and SHA'
        id: 'output-repo-name'
        uses: 'actions/github-script@v7'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const temp = '${{ runner.temp }}/artifacts';
            const repoPath = path.join(temp, 'repo_name');
            if (fs.existsSync(repoPath)) {
              const repo_name = String(fs.readFileSync(repoPath)).trim();
              core.setOutput('repo_name', repo_name);
            }
            const shaPath = path.join(temp, 'head_sha');
            if (fs.existsSync(shaPath)) {
              const head_sha = String(fs.readFileSync(shaPath)).trim();
              core.setOutput('head_sha', head_sha);
            }

  # ---- Step 2: Resolve repo + SHA (attacker values flow through) ----

  parse_run_context:
    name: 'Parse run context'
    runs-on: 'ubuntu-latest'
    needs: 'download_repo_name'
    if: always()
    outputs:
      repository: '${{ steps.set_context.outputs.REPO }}'
      sha: '${{ steps.set_context.outputs.SHA }}'
    steps:
      - id: 'set_context'
        name: 'Set dynamic repository and SHA'
        env:
          REPO: '${{ needs.download_repo_name.outputs.repo_name || github.repository }}'
          SHA: '${{ needs.download_repo_name.outputs.head_sha || github.event.inputs.head_sha || github.event.workflow_run.head_sha || github.sha }}'
        run: |
          echo "REPO=$REPO" >> "$GITHUB_OUTPUT"
          echo "SHA=$SHA" >> "$GITHUB_OUTPUT"

  # ---- Step 3: Checkout attacker's fork and run their code WITH secrets ----

  e2e:
    name: 'E2E Test'
    needs:
      - 'parse_run_context'
    runs-on: 'ubuntu-latest'
    if: always()
    steps:
      # VULN: checks out attacker-controlled repository at attacker-controlled SHA
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ needs.parse_run_context.outputs.sha }}'
          repository: '${{ needs.parse_run_context.outputs.repository }}'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20.x'

      # VULN: npm ci runs postinstall scripts from attacker's package.json
      - name: 'Install dependencies'
        run: 'npm ci'

      # VULN: runs attacker's build scripts
      - name: 'Build project'
        run: 'npm run build'

      # VULN: SECRET_API_KEY is in the environment while running attacker's code
      - name: 'Run E2E tests'
        env:
          SECRET_API_KEY: '${{ secrets.SECRET_API_KEY }}'
        run: 'npm run test:e2e'
